# DB stack cho Pixiland demo.
# Host port lệch để tránh đụng service local (vd Redis 6379 đang chạy sẵn).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pixi
      POSTGRES_PASSWORD: pixi
      POSTGRES_DB: pixiland
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixi -d pixiland"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "57017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 20
